name: business-policy-compliance-customer-resolution
version: 1.0.0
description: >-
  A Business Policy Compliance and Customer Resolution environment for policy-aware
  email operations under uncertainty. Agents must route, prioritize, escalate,
  request clarification, flag fraud, snooze timelines, and draft responses while
  obeying explicit refund, SLA, legal-risk, VIP, and suspended-account policies.
  Some scenarios include deterministic policy drift (v1->v2) and action-cost
  efficiency tradeoffs, adversarial user deception, hidden risk state, and
  specialist-review interaction.
entrypoint: business_policy_env.server:app
framework: fastapi
language: python
port: 7860
endpoints:
  health: /health
  tasks: /tasks
  reset: /reset
  step: /step
  state: /state
  close_session: /session
session:
  header: X-Session-Id
  default: default
actions:
  - categorize
  - set_priority
  - draft_response
  - escalate
  - mark_spam
  - request_info
  - flag_fraud
  - snooze
  - consult_specialist
baseline:
  command: python baseline.py --agent rule --seed 42
tasks:
  - name: easy
    objective: Single-turn tickets with clear policy constraints.
  - name: medium
    objective: Ambiguous tickets that require request_info before resolution.
  - name: hard
    objective: Multi-turn threads with temporal pressure, policy rules, and history-aware responses.
observation:
  attachment_present: bool
  attachment_summary: string
  attachment_signals:
    - string
  agent_notes:
    - string
multimodal:
  preprocessing: vl_jepa
  runtime_inference: false
  signals_precomputed: true
  image_format: png
  max_signals_per_attachment: 6
